<!DOCTYPE html>
<html>
<head>

    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <title>Visualizador base</title>

    <!-- fichero estilos -->

        html,

<body>
  <!-- Contenedor principal del mapa -->

    <script type="text/javascript">
      M.config.DPI = 25.4/0.28

        container: "mapa",
        controls:["scale*true"]
      });

    </script>
